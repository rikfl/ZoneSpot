<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=contain">
    <title>ZoneSpot</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" sizes="32x32">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png?v=5"><!-- 180x180 -->
    <link rel="manifest" href="manifest.json" />
    
    <meta name="description" content="Een persoonlijke PWA om parkeerzone informatie te tonen op basis van je locatie.">
    <meta name="theme-color" content="#f7f7f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZoneSpot">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
<div id="map"></div>
<div class="card" id="card">
  <div class="zone" id="zone"></div>
  <div class="price" id="price"></div>
  <div class="time" id="time"></div>
  <div class="errorBlock">
    <div class="errorText">
      <div class="errorTitle" id="errorTitle"></div>
      <div class="errorMsg" id="errorMsg"></div>
    </div>
  </div>
  <button class="retry-btn" id="retry-btn" hidden></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
